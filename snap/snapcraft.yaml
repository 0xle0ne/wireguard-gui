name: wireguard-gui
title: Wireguard GUI
base: core24
version: '0.1.9'
summary: Wireguard client GUI
icon: src-tauri/icons/128x128.png
description: |
  Provide a Wireguard client GUI for easy profile management
contact: https://github.com/0xle0ne/wireguard-gui/issues
license: MIT OR Apache-2.0
website: https://github.com/0xle0ne/wireguard-gui
issues: https://github.com/0xle0ne/wireguard-gui/issues
donation: https://github.com/sponsors/0xle0ne
grade: stable
source-code: https://github.com/0xle0ne/wireguard-gui
confinement: strict
platforms:
  amd64:

apps:
  wireguard-gui:
    command: usr/bin/wireguard-gui
    common-id: com.wireguard-gui.io
    extensions: [gnome]
    environment:
      IS_SNAP: "true"
    desktop: usr/share/applications/wireguard-gui.desktop
    plugs:
      - home
      - network
      - network-manager
      - network-control
      - modem-manager
      - network-setup-observe
      - firewall-control
      - hardware-observe
      - network-setup-control
      - login-session-observe
      - network-observe

parts:
  wireguard-gui:
    plugin: nil
    source: .
    override-build: |
      set -eux
      if [ -f "$CRAFT_PART_SRC/package.json" ]; then
        cd "$CRAFT_PART_SRC"
      elif [ -f "$CRAFT_PART_SRC/../package.json" ]; then
        cd "$CRAFT_PART_SRC/.."
      else
        echo "package.json not found under CRAFT_PART_SRC=$CRAFT_PART_SRC" >&2
        find "$CRAFT_PART_SRC" -maxdepth 3 -name package.json -print || true
        exit 1
      fi
      NODE_VERSION="v24.14.0"
      NODE_DIST="node-${NODE_VERSION}-linux-x64"
      NODE_ROOT="$CRAFT_PART_BUILD/.node"
      mkdir -p "$NODE_ROOT"
      curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/${NODE_DIST}.tar.xz" -o "$CRAFT_PART_BUILD/node.tar.xz"
      tar -xJf "$CRAFT_PART_BUILD/node.tar.xz" -C "$NODE_ROOT" --strip-components=1
      export CARGO_HOME="$CRAFT_PART_BUILD/.cargo"
      export RUSTUP_HOME="$CRAFT_PART_BUILD/.rustup"
      curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs -o "$CRAFT_PART_BUILD/rustup-init.sh"
      sh "$CRAFT_PART_BUILD/rustup-init.sh" -y --profile minimal --default-toolchain 1.94.0
      export PATH="$CARGO_HOME/bin:$NODE_ROOT/bin:$PATH"
      rustc --version
      cargo --version
      node --version
      npm --version
      npm install --legacy-peer-deps
      npm run tauri build -- --bundles deb
      DEB_PATH="$(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)"
      if [ -z "$DEB_PATH" ]; then
        echo "No deb artifact found under src-tauri/target/release/bundle/deb" >&2
        exit 1
      fi
      dpkg-deb -x "$DEB_PATH" "${CRAFT_PART_INSTALL:-$SNAPCRAFT_PART_INSTALL}"
    build-packages:
      - build-essential
      - curl
      - pkg-config
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
      - libssl-dev
      - dpkg
      - xz-utils

    stage-packages:
      - wireguard-tools
      - iproute2
      - network-manager
      - zenity
      - libwebkit2gtk-4.1-0
      - libjavascriptcoregtk-4.1-0
    prime:
      - -usr/share/doc
      - -usr/share/fonts
      - -usr/share/icons
      - -usr/share/lintian
      - -usr/share/man

# Mount webkit2gtk-4.1 (Tauri 2.x / libwebkit2gtk-4.1) and NM paths
layout:
  /usr/lib/x86_64-linux-gnu/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1
  /usr/lib/NetworkManager:
    bind: $SNAP/usr/lib/NetworkManager
  /etc/NetworkManager:
    # Using 'conf' to keep compatibility with older NM snaps. Another option
    # would be to copy around the systems connections when refreshing.
    bind: $SNAP_DATA/conf
  /var/lib/NetworkManager:
    bind: $SNAP_DATA/var/lib/NetworkManager
